# Detekt Configuration for Dispatch
# Runs on every build — catches code smells, complexity, style issues

build:
  maxIssues: 0  # Enforced — all pre-existing issues are captured in baseline.xml
  excludeCorrectable: false

complexity:
  CyclomaticComplexMethod:
    active: true
    threshold: 15
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 8
    ignoreDefaultParameters: true
    ignoreAnnotated: ['Composable']  # Compose functions often have many params
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 15
    thresholdInInterfaces: 10
    thresholdInObjects: 10
    thresholdInEnums: 5
  NestedBlockDepth:
    active: true
    threshold: 5

style:
  MagicNumber:
    active: false  # Too noisy for UI code (dp values, colors, etc.)
  MaxLineLength:
    active: true
    maxLineLength: 140
    excludeCommentStatements: true
  WildcardImport:
    active: false  # Compose uses wildcard imports heavily
  UnusedImports:
    active: true
  UnusedPrivateMember:
    active: true
    allowedNames: '(_|ignored|expected|serialVersionUID)'
  ReturnCount:
    active: true
    max: 4
    excludeGuardClauses: true
  ForbiddenComment:
    active: false  # Re-enable after codebase cleanup

naming:
  FunctionNaming:
    active: true
    excludes: ['**/test/**', '**/androidTest/**']
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'  # Allow PascalCase for Composables
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][A-Za-z0-9_]*'
    propertyPattern: '[A-Za-z][A-Za-z0-9_]*'

empty-blocks:
  EmptyCatchBlock:
    active: true
    allowedExceptionNameRegex: '_|ignore|expected'
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true

exceptions:
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - 'ArrayIndexOutOfBoundsException'
      - 'NullPointerException'
      - 'RuntimeException'
      - 'Throwable'
    allowedExceptionNameRegex: '_|ignore'
  SwallowedException:
    active: true
    ignoredExceptionTypes:
      - 'InterruptedException'
      - 'MalformedURLException'
      - 'NumberFormatException'
      - 'ParseException'

performance:
  SpreadOperator:
    active: true
  ForEachOnRange:
    active: true

potential-bugs:
  EqualsAlwaysReturnsTrueOrFalse:
    active: true
  UnreachableCatchBlock:
    active: true
  UselessPostfixExpression:
    active: true
